  '鍔ㄥ姏瀛?: '鍔ㄥ姏瀛︽槸鐮旂┒鐗╀綋杩愬姩涓庝綔鐢ㄥ姏涔嬮棿鍏崇郴鐨勫绉戯紝鐢ㄤ簬鍒嗘瀽鏈哄櫒浜虹殑鍙楀姏鍜岃繍鍔ㄨ寰嬨€?
};

const contentText = document.getElementById('contentText');
const chatMessages = document.getElementById('chatMessages');
const startBtn = document.getElementById('startBtn');
const startBtnText = document.getElementById('startBtnText');
const speechBtn = document.getElementById('speechBtn');
const speechBtnText = document.getElementById('speechBtnText');
const chatInput = document.getElementById('chatInput');

let currentMsgIndex = 0;
let isStarted = false;
let isPaused = false;
let pauseAfterCurrent = false;
let typingTimer = null;
let speechEnabled = true;
const speechSynthesis = window.speechSynthesis || null;

function displayContent(text) {
  contentText.textContent = text;
}

function streamContent(text, callback) {
  let charIndex = 0;
  contentText.textContent = '';
  
  function typeChar() {
    if (charIndex < text.length) {
      contentText.textContent += text[charIndex];
      charIndex++;
      let delay = 35;
      if (text[charIndex-1] === '锛? || text[charIndex-1] === '銆? || text[charIndex-1] === '.' || text[charIndex-1] === '锛? || text[charIndex-1] === '锛?) {
        delay = 80;
      }
      typingTimer = setTimeout(typeChar, delay);
    } else {
      if (callback) callback();
    }
  }
  typeChar();
}

function playNextSegment() {
  if (isPaused || pauseAfterCurrent) {
    typingTimer = setTimeout(playNextSegment, 200);
    return;
  }
  
  if (currentMsgIndex >= lectureContent.length) {
    startBtnText.textContent = '瀹屾垚';
    startBtn.disabled = true;
    return;
  }
  
  const text = lectureContent[currentMsgIndex];
  
  if (speechEnabled && speechSynthesis) {
    speakTextWithCallback(text, () => {
      currentMsgIndex++;
      if (typingTimer) clearTimeout(typingTimer);
      if (pauseAfterCurrent) {
        isPaused = true;
        pauseAfterCurrent = false;
      }
      setTimeout(playNextSegment, 800);
    });
  }
  
  streamContent(text, () => {
    if (!speechEnabled || !speechSynthesis) {
      currentMsgIndex++;
      if (pauseAfterCurrent) {
        isPaused = true;
        pauseAfterCurrent = false;
      }
      setTimeout(playNextSegment, 800);
    }
  });
}

function startLecture() {
  if (isStarted && !isPaused) return;
  
  isPaused = false;
  pauseAfterCurrent = false;
  startBtnText.textContent = '鏆傚仠璁茶В';
  startBtn.innerHTML = '<span>鈴?/span><span id="startBtnText">鏆傚仠璁茶В</span>';
  startBtn.onclick = togglePause;
  
  if (!isStarted) {
    isStarted = true;
    currentMsgIndex = 0;
  }
  
  playNextSegment();
}

function togglePause() {
  if (isPaused) {
    isPaused = false;
    pauseAfterCurrent = false;
    startBtnText.textContent = '鏆傚仠璁茶В';
    startBtn.innerHTML = '<span>鈴?/span><span id="startBtnText">鏆傚仠璁茶В</span>';
    if (speechSynthesis) speechSynthesis.resume();
    playNextSegment();
  } else {
    pauseAfterCurrent = true;
    startBtnText.textContent = '缁х画璁茶В';
    startBtn.innerHTML = '<span>鈻?/span><span id="startBtnText">缁х画璁茶В</span>';
  }
}

function restartAll() {
  if (typingTimer) clearTimeout(typingTimer);
  if (speechSynthesis) speechSynthesis.cancel();
  
  isStarted = false;
  isPaused = false;
  pauseAfterCurrent = false;
  currentMsgIndex = 0;
  
  startBtnText.textContent = '寮€濮嬭瑙?;
  startBtn.innerHTML = '<span>鈻?/span><span id="startBtnText">寮€濮嬭瑙?/span>';
  startBtn.onclick = startLecture;
  startBtn.disabled = false;
  
  displayContent('鐐瑰嚮鍙充晶銆屽紑濮嬭瑙ｃ€嶆寜閽紑濮嬪涔?);
}

function toggleSpeech() {
  if (!speechSynthesis) {
    alert('鎮ㄧ殑娴忚鍣ㄤ笉鏀寔璇煶鍚堟垚鍔熻兘');
    return;
  }
  
  speechEnabled = !speechEnabled;
  
  if (speechEnabled) {
    speechBtnText.textContent = '璇煶鏈楄';
    speechBtn.innerHTML = '<span>馃攰</span><span id="speechBtnText">璇煶鏈楄</span>';
    speechBtn.classList.remove('primary');
  } else {
    speechBtnText.textContent = '鍏抽棴鏈楄';
    speechBtn.innerHTML = '<span>馃攪</span><span id="speechBtnText">鍏抽棴鏈楄</span>';
    speechBtn.classList.add('primary');
    speechSynthesis.cancel();
  }
}

function addChatMessage(content, role = 'ai') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'ai') {
    div.innerHTML = `<div class="msg-label">AI 鍔╂墜</div><div class="msg-body">${content}</div>`;
  } else {
    div.textContent = content;
  }
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="msg-label">AI 鍔╂墜</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function removeTypingIndicator() {
  const msgEls = chatMessages.querySelectorAll('.msg');
  for (let i = msgEls.length - 1; i >= 0; i--) {
    if (msgEls[i].querySelector('.typing-indicator')) {
      msgEls[i].remove();
      break;
    }
  }
}

function sendQuestion() {
  const question = chatInput.value.trim();
  if (!question) return;
  
  addChatMessage(question, 'user');
  chatInput.value = '';
  
  let response = '鎶辨瓑锛屾垜鏆傛椂鏃犳硶鍥炵瓟杩欎釜闂銆傛偍鍙互灏濊瘯璇㈤棶鍏充簬鏈哄櫒浜哄畾涔夈€佸彂灞曞巻绋嬨€佽绋嬩綋绯汇€佸涔犲缓璁瓑鏂归潰鐨勯棶棰樸€?;
  
  for (const key in aiResponses) {
    if (question.includes(key)) {
      response = aiResponses[key];
      break;
    }
  }
  
  addTypingIndicator();
  
  setTimeout(() => {
    removeTypingIndicator();
    addChatMessage(response);
    if (speechEnabled && speechSynthesis) speakText(response);
  }, 500 + Math.random() * 300);
}

function handleKeyup(event) {
  if (event.key === 'Enter') sendQuestion();
}

function speakTextWithCallback(text, callback) {
  if (!speechEnabled || !speechSynthesis) {
    if (callback) callback();
    return;
  }
  
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';
  utterance.rate = 0.9;
  utterance.volume = 0.8;
  
  const voices = speechSynthesis.getVoices();
  const chineseVoice = voices.find(v => v.lang.startsWith('zh')) || voices.find(v => v.name.includes('Chinese'));
  if (chineseVoice) utterance.voice = chineseVoice;
  
  utterance.onend = function() { if (callback) callback(); };
  utterance.onerror = function() { if (callback) callback(); };
  
  speechSynthesis.speak(utterance);
}

function speakText(text) {
  speakTextWithCallback(text, null);
}

restartAll();
</script>
