<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>知识图谱 — 机械原理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand-start: #3370ff;
      --brand-end: #7c3df5;
      --brand-deep: #4d34d8;
      --brand-soft: #eef4ff;
      --brand-border: #d9d5ff;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #f4f7ff 0%, #eef2ff 55%, #f6f0ff 100%);
      color: #333;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mindmap-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mindmap-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Node Styles */
    .node {
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .node-center circle {
      fill: url(#centerGradient);
      stroke: var(--brand-deep);
      stroke-width: 3;
      filter: drop-shadow(0 8px 20px rgba(51, 112, 255, 0.28));
    }

    .node-center text {
      fill: #fff;
      font-size: 16px;
      font-weight: 600;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .node-level1 circle {
      fill: url(#level1Gradient);
      stroke: var(--brand-start);
      stroke-width: 2;
      filter: drop-shadow(0 4px 12px rgba(51, 112, 255, 0.2));
    }

    .node-level1 text {
      fill: #fff;
      font-size: 13px;
      font-weight: 500;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .node-level2 circle {
      fill: #fff;
      stroke: var(--brand-end);
      stroke-width: 2;
      filter: drop-shadow(0 2px 8px rgba(124, 61, 245, 0.16));
    }

    .node-level2 text {
      fill: #444;
      font-size: 12px;
      font-weight: 500;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .node-level3 circle {
      fill: var(--brand-soft);
      stroke: #adc1ff;
      stroke-width: 1.5;
    }

    .node-level3 text {
      fill: #555;
      font-size: 11px;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .node:hover circle {
      stroke-width: 3;
      filter: drop-shadow(0 6px 20px rgba(51, 112, 255, 0.28));
    }

    .node.selected circle {
      stroke-width: 4;
      stroke: #FF6B6B;
    }

    /* Connection Lines */
    .connection {
      stroke: var(--brand-border);
      stroke-width: 2;
      fill: none;
    }

    .connection-level1 {
      stroke: var(--brand-end);
      stroke-width: 3;
    }

    .connection-level2 {
      stroke: #adc1ff;
      stroke-width: 2;
    }

    .connection-level3 {
      stroke: var(--brand-border);
      stroke-width: 1.5;
    }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid var(--brand-border);
      border-radius: 12px;
      padding: 12px 16px;
      max-width: 320px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      z-index: 1000;
      display: none;
      pointer-events: none;
    }

    .tooltip.visible {
      display: block;
      animation: fadeIn 0.2s ease;
    }

    .tooltip-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--brand-deep);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tooltip-content {
      font-size: 12px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .tooltip-content strong {
      color: var(--brand-start);
    }

    .tooltip-content .formula {
      display: inline-block;
      background: #fff3e0;
      color: #e65100;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: "Times New Roman", serif;
      font-weight: 600;
      margin: 2px 0;
    }

    .tooltip-tips {
      background: linear-gradient(135deg, #edf4ff 0%, #f5eeff 100%);
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .tooltip-tips .tips-icon {
      font-size: 14px;
    }

    .tooltip-tips .tips-content {
      font-size: 11px;
      color: #555;
      line-height: 1.5;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

    // Tooltip Handling
    const tooltip = document.getElementById('tooltip');

    function showTooltip(e) {
      const node = e.target.closest('.node');
      if (!node) return;

      const nodeType = node.dataset.nodeType;
      let data = null;

      if (nodeType === 'center') {
        data = nodeData.center;
      } else if (nodeType === 'level1') {
        const section = parseInt(node.dataset.section);
        data = nodeData.level1[section];
      } else if (nodeType === 'level2') {
        const key = node.dataset.parent + '-' + node.dataset.subsection;
        data = nodeData.level2[key];
      } else if (nodeType === 'level3') {
        const key = node.dataset.parent + '-' + node.dataset.detail;
        data = nodeData.level3[key];
      }

      if (!data) return;

      tooltip.innerHTML = `
        <div class="tooltip-title">📌 ${data.title}</div>
        <div class="tooltip-content">${data.content}</div>
        <div class="tooltip-tips">
          <span class="tips-icon">💡</span>
          <span class="tips-content">${data.tips}</span>
        </div>
      `;

      tooltip.classList.add('visible');
      updateTooltipPosition(e);
    }

    function updateTooltipPosition(e) {
      let x = e.clientX + 15;
      let y = e.clientY + 15;

      if (x + tooltip.offsetWidth > window.innerWidth) {
        x = e.clientX - tooltip.offsetWidth - 15;
      }
      if (y + tooltip.offsetHeight > window.innerHeight) {
        y = e.clientY - tooltip.offsetHeight - 15;
      }

      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    }

    function hideTooltip() {
      tooltip.classList.remove('visible');
    }

    function handleCenterClick() {
      const svg = document.querySelector('.mindmap-svg');
      if (svg) {
        svg.querySelectorAll('.node-level1 circle').forEach(el => {
          el.setAttribute('stroke', '#FF6B6B');
          el.setAttribute('stroke-width', '4');
          setTimeout(() => {
            el.setAttribute('stroke', '#3370ff');
            el.setAttribute('stroke-width', '2');
          }, 2000);
        });
      }
    }

    function handleNodeClick(e) {
      e.stopPropagation();
      const node = e.target.closest('.node');
      if (!node) return;

      const nodeType = node.dataset.nodeType;
      if (nodeType === 'center') {
        handleCenterClick();
      }
    }

    function bindNodeEvents() {
      const svg = document.querySelector('.mindmap-svg');
      if (!svg) return;

      const nodes = svg.querySelectorAll('.node circle, .node text');
      nodes.forEach(el => {
        el.style.cursor = 'pointer';
        el.addEventListener('mouseenter', showTooltip);
        el.addEventListener('mousemove', updateTooltipPosition);
        el.addEventListener('mouseleave', hideTooltip);
        el.addEventListener('click', handleNodeClick);
      });
    }

    setTimeout(bindNodeEvents, 100);
  </script>
