<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>室内场景重建 — Room 3D Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #000;
      color: #333;
      height: 100vh;
      overflow: hidden;
    }

    /* === Top Bar (overlay, transparent) === */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      z-index: 10;
    }
    .topbar .back-btn {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      font-family: inherit;
    }
    .topbar .back-btn:hover { color: #fff; }
    .topbar .title {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
    }
    .topbar .badge-video {
      margin-left: auto;
      font-size: 10px;
      color: #ff8a80;
      background: rgba(229,57,53,0.2);
      border: 0.5px solid rgba(255,205,210,0.3);
      border-radius: 10px;
      padding: 2px 8px;
    }

    /* === Fullscreen Video === */
    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
  </style>
</head>
<body>

<div class="topbar">
  <span class="title">🏠 室内场景重建 — Room 3D Demo</span>
  <span class="badge-video">▶ 自动播放</span>
</div>

<div class="video-container">
  <video id="roomVideo" autoplay muted playsinline loop>
    <source src="Room.mp4" type="video/mp4">
    您的浏览器不支持视频播放。
  </video>
</div>

<script>
// Ensure video autoplay on page load
document.addEventListener('DOMContentLoaded', function() {
  const video = document.getElementById('roomVideo');
  if (video) {
    video.play().catch(function(err) {
      console.log('Autoplay blocked, waiting for interaction...');
    });
  }
});
</script>

</body>
</html>
